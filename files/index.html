<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ansible Test Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #f4f7fb, #dfe9f5);
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      max-width: 640px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      color: #2563eb;
    }
    p {
      line-height: 1.6;
      color: #4b5563;
    }
    .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: #dcfce7;
      color: #166534;
      border-radius: 999px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to the Ansible Test Page</h1>
    <p>This page was created to verify that Ansible can copy and deploy files correctly.</p>
    <p>It includes a simple layout, modern styling, and a friendly message for deployment validation.</p>
    <div class="badge">Deployment Check: Successful</div>
  </div>
</body>
</html>
